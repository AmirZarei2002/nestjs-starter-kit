version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: starter-kit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-starter-kit}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-scripts:/docker-entrypoint-initdb.d
    networks:
      - starter-kit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-starter-kit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: starter-kit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - starter-kit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: starter-kit-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-starter-kit}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      PAYMENT_API_KEY: ${PAYMENT_API_KEY:-your-payment-api-key}
      PAYMENT_API_SECRET: ${PAYMENT_API_SECRET:-your-payment-api-secret}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL:-http://localhost:3000/api/v1/payment/callback}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      CORS_HEADERS: ${CORS_HEADERS:-Content-Type,Authorization}
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - starter-kit-network
    healthcheck:
      test: ["CMD", "node", "dist/scripts/check-db-health.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: starter-kit-migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-starter-kit}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - starter-kit-network
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  seed:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: starter-kit-seed
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-starter-kit}?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - starter-kit-network
    command: ["node", "dist/src/prisma/seed.js"]
    restart: "no"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  starter-kit-network:
    driver: bridge
